<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fee Ease Kashmir</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <button id="parentButton">Parent</button>
      <button id="adminButton">Admin</button>
    </header>
    <main>
      <section id="parentDashboard">
        <div class="parent-dropdown-container">
          <label for="parentDropdown">Select Parent</label>
          <select name="parentDropdown" id="parentDropdown"></select>
        </div>

        <div class="student-dropdown-container">
          <label for="studentDropdown">Select Student</label>
          <select name="studentDropdown" id="studentDropdown"></select>
        </div>

        <div class="parentDashboardContainer">
          <label for="span">Total Fees:</label>
          <span id="totalFees"></span>
          <br />
          <label for="span">Total Paid:</label>
          <span id="totalPaid"></span>
          <br />
          <label for="span">Net Balance:</label>
          <span id="netBalanceLeft"></span>

          <div class="monthList">
            <ul id="paidByMonth">
              Month by Month List
            </ul>
          </div>
        </div>

        <div>
          <div class="amountContainer">
            <input
              type="number"
              placeholder="Enter your amount"
              id="amountInput"
            />
            <button id="amountButton">Submit Amount</button>
          </div>

          <div id="chunkContainer">
            <button id="chunkAmountFive">500</button>
            <button id="chunkAmountThousand">1000</button>
            <button id="chunkAmountFifteenHundred">1500</button>
          </div>
        </div>

        <div class="PaymentHistoryContainer">
          Payment History
          <ul id="paymentHistoryList"></ul>
        </div>
      </section>

      <section id="adminDashboard">
        Admin Dashboard

        <div class="totalRevenueContainer">
          <span>Todays Total: </span>
          <div id="todayCollection"></div>

          <span>Monthly Total: </span>
          <div id="monthlyCollection"></div>

          <span>Yearly Total: </span>
          <div id="yearlyCollection"></div>
        </div>

        <div class="pendingFeesContainer">
          <ul id="studentsPendingFeesList"></ul>
        </div>

        <div class="addParents">
          <label for="text">Add New Parent:</label>
          <input type="text" id="addParentInput" placeholder="Add new parent" />
          <!-- <button id="addParentButton">Add Parent</button> -->
        </div>
        <div class="addStudents">
          <label for="text">Add New Student:</label>
          <input
            type="text"
            id="addStudentsInput"
            placeholder="Add new student"
          />

          <label for="text">Assign class</label>
          <input type="text" placeholder="Assign Class" id="assignClassInput" />
          <button id="addStudentsButton">Submit Student Details</button>
        </div>

        <div class="addClass"></div>

        <div class="assignMonthAndFees">
          <label for="number">Assign Fees</label>
          <input type="number" placeholder="Assign Fees" id="assignFeesInput" />

          <label for="text">Fees Month</label>
          <input type="text" placeholder="Fees Month" id="assignMonthInput" />

          <button id="addFeesMonthButton">Add Fees and Month</button>
        </div>

        <div class="endOfYearPromotionContainer">
          <div id="modalContainer">
            <ul id="modalStudentList"></ul>
            <button id="promotionButton">Promote</button>
          </div>
          <button id="showModalDialoge">Promote Students To Next Class</button>
        </div>
      </section>
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
